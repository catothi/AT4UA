<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Feedback-Formular (POST)</title>
    <style>
        body      { font-family: sans-serif; background: #fee; padding: 2em; }
        fieldset  { background: #f5dddd; padding: 1em 2em; max-width: 520px; }
        legend    { font-weight: bold; }
        div       { margin: 0.5em 0; }
        label     { display: inline-block; width: 110px; }
        input[type=text], input[type=email], input[type=number],
        textarea  { width: 320px; }
        textarea  { height: 80px; vertical-align: top; }
        button    { padding: 0.3em 1.2em; }
        .hint     { font-size: 0.9em; color: #800; }
    </style>
</head>
<body>

<!-- Im Unterschied zu feedback.html:  method="post"
     -> die Eingaben landen NICHT im Query-String der URL,
        sondern im BODY der HTTP-Anfrage.
     action zeigt auf das neue FeedbackPostServlet unter /feedbackPost. -->
<form id="myFormPost" method="post" action="feedbackPost">
    <fieldset>
        <legend>Feedback-Formular (POST)</legend>

        <div>
            <label for="titel">Titel:</label>
            <input type="text" list="titelList" name="titel" id="titel" autofocus>
            <datalist id="titelList">
                <option value="Herr">
                <option value="Frau">
                <option value="Dr.">
                <option value="Prof.">
                <option value="Prof. Dr.">
            </datalist>
        </div>

        <div>
            <label for="name">Name:</label>
            <input type="text" name="name" id="name" placeholder="Ihr Name">
        </div>

        <div>
            <label for="vname">Vorname:</label>
            <input type="text" name="vname" id="vname" placeholder="Ihr Vorname">
        </div>

        <div>
            <label for="mail">E-Mail:</label>
            <input type="email" name="mail" id="mail" placeholder="E-Mail-Adresse">
        </div>

        <div>
            <label for="geboren">Geburtsjahr:</label>
            <input type="number" name="geboren" id="geboren" value="1990" min="1900" max="2025">
        </div>

        <div>
            <label for="nachricht">Ihre Nachricht:</label>
            <textarea name="nachricht" id="nachricht" placeholder="Hier Nachricht eingeben..."></textarea>
        </div>

        <div>
            <input type="checkbox" name="reply" id="reply" value="reply">
            <label for="reply">Rueckmeldung erwuenscht</label>
        </div>

        <div style="text-align:center">
            <button name="absenden" type="submit" value="absenden">Absenden</button>
            <button name="Reset"    type="reset">Zuruecksetzen</button>
        </div>

        <p class="hint">Hinweis: nach dem Absenden steht in der URL nur
            <code>/feedbackPost</code> – die Eingaben sind im Body.</p>
    </fieldset>
</form>

<p><a href="/">Zurueck zum GET-Formular</a></p>

</body>
</html>
